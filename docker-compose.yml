version: "3.9"

services:
  # ── Lead Autopilot App ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lead-autopilot
    ports:
      - "8080:8000"
    env_file:
      - .env
    environment:
      # n8n internal network address (overrides .env for inter-container comms)
      - N8N_WEBHOOK_BASE_URL=http://n8n:5678
      # Override LLM endpoint to reach the host machine from inside Docker!
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      n8n:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./app/static:/app/app/static:ro
    networks:
      - autopilot

  # ── n8n Workflow Automation ───────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: lead-autopilot-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Berlin
      # n8n calls back to app using internal Docker network
      - APP_BASE_URL=http://app:8000
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - autopilot

networks:
  autopilot:
    driver: bridge

volumes:
  n8n_data:
    driver: local
