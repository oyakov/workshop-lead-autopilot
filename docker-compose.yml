version: "3.9"

services:
  # ── Main application ───────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx, sys; sys.exit(0 if httpx.get('http://localhost:8000/api/v1/healthz').status_code==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Redis (rate limiter persistent storage for production) ─────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Test runner (e2e) ──────────────────────────────────────────────────────
  test:
    build: .
    command: >
      sh -c "python -m pytest tests/ -v --tb=short --no-header"
    env_file:
      - .env.test
    environment:
      - ENVIRONMENT=development
      - SECRET_KEY=test-secret-key-long-enough-32ch
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=testpass123
      - CRM_PROVIDER=none
      - LLM_PROVIDER=lmstudio
      - SUPABASE_URL=
      - SUPABASE_KEY=
    profiles:
      - test
