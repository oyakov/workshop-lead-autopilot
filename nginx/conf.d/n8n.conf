# ── vestint-n8n.duckdns.org → n8n workflow engine ────────────────────────────

upstream n8n_backend {
    server n8n:5678;
    keepalive 16;
}

# HTTP: ACME challenge + redirect
server {
    listen 80;
    server_name vestint-n8n.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: n8n proxy with WebSocket support
server {
    listen 443 ssl http2;
    server_name vestint-n8n.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/vestint-n8n.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vestint-n8n.duckdns.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/vestint-n8n.duckdns.org/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # n8n uses WebSocket for real-time editor updates
    location /rest/push {
        proxy_pass http://n8n_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://n8n_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        # n8n uploads
        client_max_body_size 50m;
    }
}
