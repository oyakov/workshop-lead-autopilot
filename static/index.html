<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop — Lead-to-CRM Autopilot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f11; color: #e2e8f0; min-height: 100vh; }

  .topbar { background: #1a1a2e; border-bottom: 1px solid #2d2d44; padding: 14px 32px; display: flex; align-items: center; gap: 12px; }
  .topbar .logo { font-size: 20px; font-weight: 700; color: #a78bfa; letter-spacing: -0.5px; }
  .topbar .tagline { font-size: 13px; color: #64748b; }
  .topbar .badge { margin-left: auto; background: #1e3a2f; color: #4ade80; font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid #166534; }

  .layout { display: grid; grid-template-columns: 380px 1fr; gap: 0; height: calc(100vh - 53px); }

  .sidebar { background: #13131f; border-right: 1px solid #2d2d44; overflow-y: auto; padding: 24px; }
  .sidebar h2 { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
  .form-group input, .form-group textarea { width: 100%; background: #1e1e2e; border: 1px solid #2d2d44; border-radius: 8px; padding: 9px 12px; color: #e2e8f0; font-size: 14px; outline: none; transition: border-color .2s; }
  .form-group input:focus, .form-group textarea:focus { border-color: #a78bfa; }
  .form-group textarea { resize: vertical; min-height: 80px; font-family: inherit; }

  .btn { width: 100%; padding: 11px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-primary { background: #7c3aed; color: white; }
  .btn-primary:hover { background: #6d28d9; }
  .btn-primary:disabled { background: #3f3f5a; color: #64748b; cursor: not-allowed; }
  .btn-sm { width: auto; padding: 5px 12px; font-size: 12px; border-radius: 6px; }
  .btn-green { background: #166534; color: #4ade80; border: 1px solid #166534; }
  .btn-green:hover { background: #14532d; }
  .btn-orange { background: #7c2d12; color: #fb923c; border: 1px solid #7c2d12; font-size: 11px; }
  .btn-orange:hover { background: #6c2311; }

  .main { overflow-y: auto; padding: 24px; }
  .main h2 { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }

  .leads-grid { display: flex; flex-direction: column; gap: 12px; }

  .lead-card { background: #1a1a2e; border: 1px solid #2d2d44; border-radius: 12px; padding: 16px; cursor: pointer; transition: border-color .2s; }
  .lead-card:hover, .lead-card.active { border-color: #a78bfa; }
  .lead-card.active { background: #1e1835; }

  .lead-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .lead-name { font-size: 15px; font-weight: 600; }
  .lead-company { font-size: 12px; color: #94a3b8; margin-top: 1px; }
  .lead-id { font-size: 10px; color: #4b5563; font-family: monospace; }

  .status-pill { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .status-new { background: #1e3a5f; color: #60a5fa; }
  .status-contacted { background: #1e3a2f; color: #4ade80; }
  .status-qualified { background: #2d1a5e; color: #c084fc; }
  .status-meeting_set { background: #3b2a0a; color: #fbbf24; }
  .status-closed_won { background: #14532d; color: #86efac; }
  .status-closed_lost { background: #2d1515; color: #f87171; }

  .intent-pill { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: #252540; color: #a78bfa; }

  .lead-inquiry { font-size: 13px; color: #94a3b8; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .lead-footer { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  .owner-tag { font-size: 11px; color: #64748b; }

  .detail-panel { background: #13131f; border: 1px solid #2d2d44; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .detail-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: #c4b5fd; }

  .field-row { display: flex; gap: 8px; margin-bottom: 8px; font-size: 13px; }
  .field-label { color: #64748b; min-width: 110px; }
  .field-value { color: #e2e8f0; }

  .draft-box { background: #0f0f1a; border: 1px solid #2d2d44; border-radius: 8px; padding: 14px; margin-top: 12px; }
  .draft-subject { font-size: 13px; font-weight: 600; color: #c4b5fd; margin-bottom: 8px; }
  .draft-body { font-size: 13px; color: #94a3b8; white-space: pre-wrap; line-height: 1.6; }

  .events-list { list-style: none; }
  .events-list li { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid #1e1e2e; font-size: 12px; }
  .events-list li:last-child { border-bottom: none; }
  .event-time { color: #4b5563; min-width: 90px; font-family: monospace; }
  .event-type { color: #a78bfa; min-width: 180px; }
  .event-detail { color: #64748b; }

  .empty-state { text-align: center; padding: 60px 20px; color: #4b5563; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #166534; color: #4ade80; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; z-index: 100; border: 1px solid #166534; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #4b5563; border-top-color: #a78bfa; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .processing-badge { display: flex; align-items: center; gap: 6px; background: #1a1a2e; border: 1px solid #3d3d60; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #94a3b8; margin-top: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Workshop</div>
  <div class="tagline">Lead-to-CRM Autopilot — Demo</div>
  <div class="badge">● LIVE</div>
</div>

<div class="layout">
  <!-- LEFT: Intake Form -->
  <div class="sidebar">
    <h2>New Lead Intake</h2>
    <div class="form-group">
      <label>First Name *</label>
      <input id="f-fname" type="text" placeholder="Ivan" value="Ivan">
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input id="f-lname" type="text" placeholder="Petrov" value="Petrov">
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input id="f-email" type="email" placeholder="ivan@company.com" value="ivan@techcorp.rs">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input id="f-phone" type="text" placeholder="+381 11 ...">
    </div>
    <div class="form-group">
      <label>Company</label>
      <input id="f-company" type="text" placeholder="Tech Corp">
    </div>
    <div class="form-group">
      <label>Message *</label>
      <textarea id="f-inquiry" placeholder="Describe your automation need...">We're losing leads because our sales team doesn't respond fast enough. We use HubSpot but nobody fills it in. Can you automate our lead capture and follow-up process?</textarea>
    </div>
    <button class="btn btn-primary" id="submit-btn" onclick="submitLead()">Submit Lead →</button>
    <div id="processing" style="display:none" class="processing-badge">
      <div class="spinner"></div> AI is classifying and generating draft reply...
    </div>
  </div>

  <!-- RIGHT: Dashboard -->
  <div class="main">
    <h2>CRM Pipeline <span id="lead-count" style="color:#4b5563;font-weight:400"></span></h2>

    <div id="leads-list" class="leads-grid">
      <div class="empty-state">
        <div class="icon">🎯</div>
        <div>No leads yet. Submit a test lead to see the full pipeline.</div>
      </div>
    </div>

    <div id="lead-detail" style="display:none; margin-top:20px">
      <div class="detail-panel">
        <h3>Lead Details</h3>
        <div id="detail-fields"></div>
      </div>
      <div class="detail-panel" id="draft-panel" style="display:none">
        <h3>AI-Generated Draft Reply <span id="approval-status"></span></h3>
        <div class="draft-box">
          <div class="draft-subject" id="draft-subject"></div>
          <div class="draft-body" id="draft-body"></div>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-sm btn-green" id="approve-btn" onclick="approveDraft()">✓ Approve &amp; Send</button>
          <button class="btn btn-sm btn-orange" id="sla-btn" onclick="triggerSLA()">⏰ Trigger SLA Breach (demo)</button>
        </div>
      </div>
      <div class="detail-panel">
        <h3>Event Log</h3>
        <ul class="events-list" id="event-list"></ul>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let selectedLead = null;
let pollTimer = null;

async function submitLead() {
  const btn = document.getElementById('submit-btn');
  const proc = document.getElementById('processing');
  const data = {
    first_name: document.getElementById('f-fname').value.trim(),
    last_name: document.getElementById('f-lname').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    company_name: document.getElementById('f-company').value.trim(),
    inquiry_text: document.getElementById('f-inquiry').value.trim(),
    source: 'webform'
  };
  if (!data.first_name || !data.email || !data.inquiry_text) {
    showToast('Please fill in required fields', '#7c2d12', '#fb923c');
    return;
  }
  btn.disabled = true;
  proc.style.display = 'flex';
  try {
    const res = await fetch('/api/leads', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    const result = await res.json();
    if (!res.ok) throw new Error(result.detail || 'Error');
    showToast(`Lead ${result.lead_id} created → owner: ${result.owner}`);
    await refreshLeads();
    // Auto-select new lead and poll until draft is ready
    selectedLead = result.lead_id;
    pollForDraft(result.lead_id);
  } catch(e) {
    showToast('Error: ' + e.message, '#7c2d12', '#fb923c');
  } finally {
    btn.disabled = false;
    proc.style.display = 'none';
  }
}

async function refreshLeads() {
  const leads = await fetch('/api/leads').then(r=>r.json());
  const container = document.getElementById('leads-list');
  document.getElementById('lead-count').textContent = `(${leads.length})`;
  if (!leads.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🎯</div><div>No leads yet. Submit a test lead to see the full pipeline.</div></div>';
    return;
  }
  container.innerHTML = leads.map(l => `
    <div class="lead-card ${l.lead_id === selectedLead ? 'active' : ''}" onclick="selectLead('${l.lead_id}')">
      <div class="lead-header">
        <div>
          <div class="lead-name">${l.first_name} ${l.last_name}</div>
          <div class="lead-company">${l.company_name || l.company_domain || '—'}</div>
        </div>
        <div style="text-align:right">
          <span class="status-pill status-${l.status}">${l.status.replace('_',' ')}</span>
          <div class="lead-id" style="margin-top:4px">#${l.lead_id}</div>
        </div>
      </div>
      <div class="lead-inquiry">${l.inquiry_text}</div>
      <div class="lead-footer">
        <span class="intent-pill">${l.intent_category}</span>
        <span class="owner-tag">→ ${l.owner}</span>
        ${l.draft_approved ? '<span style="font-size:11px;color:#4ade80">✓ draft sent</span>' : ''}
      </div>
    </div>
  `).join('');

  if (selectedLead) selectLead(selectedLead);
}

async function selectLead(id) {
  selectedLead = id;
  await refreshLeads();
  const lead = await fetch(`/api/leads/${id}`).then(r=>r.json());
  const events = await fetch(`/api/leads/${id}/events`).then(r=>r.json());

  document.getElementById('lead-detail').style.display = 'block';

  const fields = [
    ['Lead ID', '#' + lead.lead_id],
    ['Name', `${lead.first_name} ${lead.last_name}`],
    ['Email', lead.email],
    ['Company', lead.company_name || '—'],
    ['Domain', lead.company_domain || '—'],
    ['Intent', lead.intent_category],
    ['Status', lead.status],
    ['Owner', lead.owner],
    ['Source', lead.source],
    ['Created', formatTime(lead.created_at)],
    ['Next Action', lead.next_action_due_at ? formatTime(lead.next_action_due_at) : '—'],
    ['HubSpot Deal', lead.crm_deal_id ? `<a href="https://app.hubspot.com/contacts/deals/${lead.crm_deal_id}" target="_blank" style="color:#a78bfa">#${lead.crm_deal_id} ↗</a>` : '<span style="color:#4b5563">not connected</span>'],
  ];
  document.getElementById('detail-fields').innerHTML = fields.map(([k,v]) =>
    `<div class="field-row"><span class="field-label">${k}</span><span class="field-value">${v}</span></div>`
  ).join('');

  const draftPanel = document.getElementById('draft-panel');
  if (lead.draft_body) {
    draftPanel.style.display = 'block';
    document.getElementById('draft-subject').textContent = lead.draft_subject;
    document.getElementById('draft-body').textContent = lead.draft_body;
    const approveBtn = document.getElementById('approve-btn');
    const approvalStatus = document.getElementById('approval-status');
    if (lead.draft_approved) {
      approvalStatus.innerHTML = '<span style="color:#4ade80;font-size:12px">✓ Approved & Sent</span>';
      approveBtn.disabled = true;
    } else {
      approvalStatus.innerHTML = '<span style="color:#fbbf24;font-size:12px">⏳ Awaiting Approval</span>';
      approveBtn.disabled = false;
    }
  } else {
    draftPanel.style.display = 'none';
  }

  document.getElementById('event-list').innerHTML = events.map(e =>
    `<li><span class="event-time">${formatTime(e.created_at).split(' ')[1]||formatTime(e.created_at)}</span><span class="event-type">${e.event_type}</span><span class="event-detail">${e.detail}</span></li>`
  ).join('') || '<li style="color:#4b5563;font-size:12px">No events yet</li>';
}

async function approveDraft() {
  if (!selectedLead) return;
  await fetch(`/api/leads/${selectedLead}/approve`, {method:'POST'});
  showToast('Draft approved — email sent (simulated)');
  await selectLead(selectedLead);
  await refreshLeads();
}

async function triggerSLA() {
  if (!selectedLead) return;
  await fetch(`/api/leads/${selectedLead}/sla-check`, {method:'POST'});
  showToast('SLA breach triggered — check event log', '#7c2d12', '#fb923c');
  await selectLead(selectedLead);
}

function pollForDraft(id, attempts=0) {
  clearTimeout(pollTimer);
  if (attempts > 20) return;
  pollTimer = setTimeout(async () => {
    const lead = await fetch(`/api/leads/${id}`).then(r=>r.json());
    await selectLead(id);
    if (!lead.draft_body) pollForDraft(id, attempts+1);
  }, 1500);
}

function formatTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'Z');
  return d.toLocaleString('en-GB', {hour12:false}).replace(',','');
}

function showToast(msg, bg='#166534', color='#4ade80') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = bg;
  t.style.color = color;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

// Initial load
refreshLeads();
setInterval(refreshLeads, 5000);
</script>
</body>
</html>
