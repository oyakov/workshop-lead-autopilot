<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop — Security Portal Login</title>
  <!-- Modern Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'Space Grotesk', monospace;
      
      --bg-base: #06050a;
      --bg-surface: rgba(18, 16, 29, 0.75);
      --bg-card: rgba(26, 23, 44, 0.45);
      --bg-input: rgba(13, 11, 23, 0.95);
      --border-glow: rgba(167, 139, 250, 0.2);
      --border-muted: rgba(255, 255, 255, 0.08);
      
      --color-primary: #a78bfa;
      --color-accent: #38bdf8;
      
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --text-dark: #4b5563;
      
      --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --glass-shadow: 0 16px 40px 0 rgba(0, 0, 0, 0.6);
      --blur-strength: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.09) 0%, transparent 45%);
      position: relative;
    }

    /* Ambient Glowing Circles */
    .glow-circle {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .glow-left { top: 15%; left: 15%; }
    .glow-right { bottom: 10%; right: 15%; }

    /* Login Card Container */
    .login-container {
      width: 440px;
      z-index: 10;
      position: relative;
      animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-muted);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(var(--blur-strength));
      -webkit-backdrop-filter: blur(var(--blur-strength));
      position: relative;
      overflow: hidden;
    }

    /* Subtle Border Highlight effect */
    .login-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-primary), var(--color-accent), transparent);
    }

    .logo-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-svg {
      width: 48px;
      height: 48px;
      fill: var(--color-primary);
      filter: drop-shadow(0 0 12px rgba(167, 139, 250, 0.6));
      margin-bottom: 16px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    .logo-text {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .tagline {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* Forms */
    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-muted);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text-main);
      font-size: 15px;
      outline: none;
      transition: all var(--transition-normal);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }

    .form-group input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15), inset 0 2px 4px rgba(0,0,0,0.15);
      background: rgba(18, 16, 29, 0.95);
    }

    /* Primary Button */
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all var(--transition-normal);
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      color: white;
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.35);
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(124, 58, 237, 0.5);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      background: #1e1b30;
      color: var(--text-dark);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: rgba(13, 11, 23, 0.95);
      border: 1px solid #f87171;
      color: #f87171;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      display: none;
      z-index: 100;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(239, 68, 68, 0.15);
      backdrop-filter: blur(8px);
      transition: all 0.3s;
    }

    .footer-note {
      text-align: center;
      margin-top: 32px;
      font-size: 11px;
      color: var(--text-dark);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <!-- Glowing Background Orbs -->
  <div class="glow-circle glow-left"></div>
  <div class="glow-circle glow-right"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-header">
        <svg class="logo-svg" viewBox="0 0 24 24">
          <path d="M12 2L2 22h20L12 2zm0 3.3L18.6 19H5.4L12 5.3zm-1 5.7v4h2v-4h-2zm0 6v2h2v-2h-2z"/>
        </svg>
        <h1 class="logo-text">Workshop Autopilot</h1>
        <p class="tagline">Enterprise Security Portal Login</p>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Manager Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
        </div>

        <div class="form-group" style="margin-bottom: 32px;">
          <label for="password">Security Password</label>
          <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn">
          <span>Authorize Session</span>
          <span class="spinner" id="btn-spinner" style="display: none;"></span>
        </button>
      </form>

      <div class="footer-note">
        PROTECTED BY HIGH-FIDELITY SIGNED TOKENS • PUBLIC DISPATCH INTAKE ACTIVE
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      
      const btn = document.getElementById('login-btn');
      const spinner = document.getElementById('btn-spinner');
      const btnText = btn.querySelector('span');
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      
      const data = {
        username: usernameInput.value.trim(),
        password: passwordInput.value
      };
      
      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Verifying...';
      
      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        const result = await res.json();
        
        if (!res.ok) {
          throw new Error(result.detail || 'Authorization failed');
        }
        
        // Successful login: Redirect to root page dashboard
        window.location.href = '/';
      } catch (err) {
        showToast(err.message);
        passwordInput.value = '';
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Authorize Session';
      }
    }
    
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 4000);
    }
  </script>
</body>
</html>
